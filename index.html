<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eda-watcher</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        integrity="sha512-rO+olRTkcf304DQBxSWxln8JXCzTHlKnIdnMUwYvQa9/Jd4cQaNkItIUj6Z4nvW1dqK0SKXLPn0Hng7MMcRpw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c2230;
      --border: #2d333b;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f6feb33;
      --green: #3fb950;
      --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    header .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    header .logo .dot { color: var(--accent); }
    header .status {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    header .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 var(--green);
      animation: pulse 2.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(63,185,80,.5); }
      70% { box-shadow: 0 0 0 6px rgba(63,185,80,0); }
      100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
    }

    main {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
    }

    /* LEFT COLUMN */
    #left {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
    }
    #entry-list {
      flex: 0 0 38%;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
      padding: 8px;
    }
    .entry {
      position: relative;
      padding: 9px 30px 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
      transition: background .12s, border-color .12s;
    }
    .entry:hover { background: var(--panel-2); }
    .entry .del {
      position: absolute;
      top: 6px; right: 6px;
      width: 20px; height: 20px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      border-radius: 5px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .12s, background .12s, color .12s;
    }
    .entry:hover .del { opacity: 1; }
    .entry .del:hover { background: var(--red); color: #fff; }
    .entry.active {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .entry .title { font-size: 14px; font-weight: 600; }
    .entry .meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .entry .note { font-size: 12px; color: var(--muted); margin-top: 4px; font-style: italic; }

    #code-pane {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #tabs {
      display: flex;
      gap: 2px;
      padding: 6px 8px 0;
      overflow-x: auto;
      background: var(--panel);
      flex: 0 0 auto;
    }
    .tab {
      padding: 6px 12px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      white-space: nowrap;
      border: 1px solid transparent;
      border-bottom: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--text);
      background: var(--bg);
      border-color: var(--border);
    }
    #code-wrap {
      flex: 1 1 auto;
      overflow: auto;
      background: var(--bg);
    }
    #code-wrap pre { margin: 0; }
    #code-wrap code {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12.5px;
      line-height: 1.55;
      padding: 14px 16px;
    }

    /* RIGHT COLUMN */
    #right {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px;
      background: var(--panel);
      min-width: 0;
    }
    .img-card {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg);
    }
    .img-card .img-name {
      font-size: 11px;
      color: var(--muted);
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      font-family: "SF Mono", Menlo, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .img-card img {
      display: block;
      width: 100%;
      cursor: zoom-in;
      background: #fff;
    }
    .img-missing {
      padding: 20px;
      color: var(--red);
      font-size: 13px;
      text-align: center;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      padding: 24px;
      text-align: center;
    }
    .banner {
      background: var(--red);
      color: #fff;
      font-size: 12px;
      padding: 8px 14px;
      display: none;
    }
    .banner.show { display: block; }

    #toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 50;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: var(--red); }

    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <header>
    <span class="logo">eda<span class="dot">·</span>watcher</span>
    <span class="status">
      <span class="pulse"></span>
      <span id="status-text">live</span>
    </span>
  </header>
  <div id="banner" class="banner"></div>
  <main>
    <div id="left">
      <div id="entry-list"><div class="empty">loading…</div></div>
      <div id="code-pane">
        <div id="tabs"></div>
        <div id="code-wrap"></div>
      </div>
    </div>
    <div id="right"><div class="empty">select an entry</div></div>
  </main>
  <div id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
          integrity="sha512-D9gUyxqja7hBtkWpPWGt9wfbfaMGVUl8XBVz//bGv3w8eVz9JZCY3+JxFLowSO+r7Q0eyzkmf6lkx2RWvE0Vg=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"
          integrity="sha512-XLk3UC2EAS8Fpu+JBSDgnFvW3Tt/i9KvFB4FjVxHB68JcQuOyVbtwT1qa9c9bUNQ4dLfRFw7MWGTwhRkLIN9g=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/app.js"></script>
</body>
</html>
